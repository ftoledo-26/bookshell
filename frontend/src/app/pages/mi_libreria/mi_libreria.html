<main class="home-shell">
  <section class="home-column">
    <header class="hero-head">
      <h1>Mi librería</h1>
      <p>Guarda y revisa aquí los libros que has leído con tu propia colección.</p>
    </header>

    <p class="status" *ngIf="isLoading">Cargando tu librería...</p>
    <p class="status error" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="status" *ngIf="successMessage">{{ successMessage }}</p>

    <section class="recommended-zone" *ngIf="!isLoading && books.length > 0">
      <header class="section-head">
        <h2>Libros leídos</h2>
      </header>

      <div class="recommended-strip">
        <article class="book-tile" *ngFor="let book of books">
          <div class="cover-wrap">
            <img [src]="book.portada || '/prueba.webp'" [alt]="book.titulo" loading="lazy" />
          </div>
          <footer>
            <strong>{{ book.titulo }}</strong>
            <span>{{ book.autor }}</span>
          </footer>
        </article>
      </div>
    </section>

    <p class="status" *ngIf="!isLoading && books.length === 0">
      Aún no hay libros guardados en tu librería.
    </p>
  </section>
</main>

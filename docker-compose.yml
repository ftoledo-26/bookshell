
services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
    ports:
      - "4200:4200"
    command: sleep infinity

  laravel:
    build:
      context: ./prueba
      dockerfile: Dockerfile
    container_name: laravel12_app
    ports:
      - "8080:80"             # Laravel accesible en http://localhost:8080
    volumes:
      - ./prueba:/var/www/html   # BIND VOLUME: código en tu PC
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: laravel12_db
    ports:
      - "3307:3306"             # Laravel accesible en http://localhost:8080
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: laravel12_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"             # phpMyAdmin en http://localhost:8081
    depends_on:
      - db


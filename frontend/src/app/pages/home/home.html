<div class="home-shell">
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <h1>Bookshell</h1>
    </div>
    <nav class="menu">
      <a href="#">Inicio</a>
      <a href="#">Diario</a>
      <a href="#">Listas</a>
      <a href="#">Resenas</a>
    </nav>
    <button class="cta">+ Registrar lectura</button>
  </header>

  <section class="section-block">
    <div class="section-head">
      <h3>Libros desde la API</h3>
    </div>

    <p *ngIf="isLoading">Cargando libros...</p>

<div *ngIf="!isLoading && books.length > 0" class="book-grid">
  <article class="book-card" *ngFor="let book of books">
    <img src="/prueba.webp" [alt]="book.titulo" />
    <div class="book-meta">
	<h4>{{ book.titulo }}</h4>
      <p>{{ book.autor }}</p>
      <span>{{ book.descripcion }}</span>
    </div>
  </article>
</div>

<p *ngIf="!isLoading && books.length === 0">No hay libros</p>
  </section>

  <section class="split-layout">
    <article class="panel">
      <div class="section-head">
        <h3>Actividad de amigos</h3>
        <a href="#">Feed completo</a>
      </div>

      <ul class="activity-list">
        <li *ngFor="let item of friendActivity">
          <div>
            <strong>{{ item.user }}</strong>
            <p>{{ item.action }} <span>{{ item.book }}</span></p>
          </div>
          <span class="score" *ngIf="item.score !== null">{{ item.score }} ★</span>
          <span class="score muted" *ngIf="item.score === null">sin nota</span>
        </li>
      </ul>
    </article>
  </section>
</div>

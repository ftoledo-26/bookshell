<div class="home-shell">
  <div class="login-layout">
    <section class="auth-card login-card">
      <div class="hero-head">
        <h2>Login</h2>
      </div>

    <div class="recommended-zone login-card">
      <form (ngSubmit)="onSubmit()">
        <label for="email">Email:</label>
        <input type="email" id="email" [(ngModel)]="email" name="email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" [(ngModel)]="password" name="password" required>

        <div class="status error" *ngIf="errorMessage">{{ errorMessage }}</div>

        <button type="submit">Login</button>
      </form>

      <p class="status" *ngIf="loginMessage">{{ loginMessage }}</p>
    </section>

    <section class="auth-card login-card register-card">
      <div class="hero-head">
        <h2>Register</h2>
      </div>

      <form (ngSubmit)="onRegister()">
        <label for="registerUsername">Username:</label>
        <input type="text" id="registerUsername" [(ngModel)]="registerUsername" name="registerUsername" required>

        <label for="email">Email:</label>
        <input type="email" id="email" [(ngModel)]="registerEmail" name="registerEmail" required>

        <label for="registerPassword">Password:</label>
        <input type="password" id="registerPassword" [(ngModel)]="registerPassword" name="registerPassword" required>

        <label for="telefono">Telefono:</label>
        <input type="text" id="telefono" [(ngModel)]="registerTelefono" name="registerTelefono" required>

        <label for="localidad">Localidad:</label>
        <input type="text" id="localidad" [(ngModel)]="registerLocalidad" name="registerLocalidad" required>

        <button type="submit">Registrarse</button>
      </form>

      <p class="status" *ngIf="registerMessage">{{ registerMessage }}</p>
    </section>
  </div>
</div>
